    name: LeadIQ MCP Server
    description: >-
      Model Context Protocol server that exposes LeadIQ's verified B2B contact
      and company intelligence to AI agents (Claude Desktop, Claude Code,
      Cursor, and any MCP-compatible client). Provides conversational access to
      the same searchPeople, searchCompany, advanced search, prospect-list, and
      account-usage capabilities offered by the Data API, with credentialing
      handled via the LeadIQ API key.
