aid: leadiq
name: LeadIQ
description: >-
  LeadIQ is a B2B sales intelligence and contact data platform headquartered in
  Santa Clara, California (with engineering in Singapore and Brisbane) that helps
  outbound sales teams identify, capture, enrich, and engage prospects across
  Salesforce, HubSpot, Outreach, Salesloft, Gong, and other revenue tools. The
  product portfolio includes Prospector (Chrome extension for contact capture
  with verified work emails and direct-dial mobile phones), Scribe (AI message
  writer), Refresh / CRM Enrichment (continuous contact and account hygiene for
  Salesforce and HubSpot), Champion Tracking (job-change alerts on existing
  contacts), AI Account Prospecting (ICP-fit account and persona discovery), and
  Lando — an agentic AI assistant that fuses first-party CRM data with LeadIQ's
  third-party intelligence behind a conversational interface. LeadIQ exposes a
  public GraphQL Data API at https://api.leadiq.com/graphql for programmatic
  people search, company search, advanced grouped search, prospect-list
  management, usage reporting, and data-feedback submission, authenticated via
  HTTP Basic auth with an API key issued in the LeadIQ dashboard. The same
  API surface is also reachable through a Model Context Protocol (MCP) server
  so AI agents (including Claude) can query verified contact and account data
  conversationally. Rate limits default to 10 requests/minute on Free and 60
  requests/minute on paid plans, with credit-based metering where an email
  costs 1 credit, a phone 10 credits, and account enrichment 3 credits.
